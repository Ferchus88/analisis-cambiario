<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOLAR.AR // ANÁLISIS CAMBIARIO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --orange: #FF6A00;
    --orange-dim: rgba(255,106,0,0.15);
    --orange-glow: rgba(255,106,0,0.4);
    --bg: #080808;
    --surface: #0d0d0d;
    --surface2: #111;
    --text: #e8e0d5;
    --text-dim: #7a6e65;
    --green: #00ff88;
    --yellow: #ffdd00;
    --red: #ff3355;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,106,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,106,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── SCANLINES ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none; z-index: 1;
    animation: scanline 8s linear infinite;
  }

  @keyframes scanline {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 2;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,106,0,0.25);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(18px, 4vw, 26px);
    color: var(--orange);
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--orange-glow), 0 0 40px rgba(255,106,0,0.2);
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  .clock {
    font-family: 'Share Tech Mono', monospace;
    color: var(--orange);
    font-size: 13px;
    letter-spacing: 2px;
    opacity: 0.75;
    text-align: right;
  }

  .clock .date { font-size: 10px; opacity: 0.6; margin-top: 2px; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid rgba(255,106,0,0.18);
    border-radius: 2px;
    padding: 28px 30px;
    position: relative;
    margin-bottom: 20px;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), rgba(255,106,0,0.3), transparent);
  }

  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.8;
  }

  /* ── FORM ELEMENTS ── */
  label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="password"],
  input[type="url"],
  input[type="text"],
  select {
    width: 100%;
    background: var(--bg);
    border: 1px solid rgba(255,106,0,0.25);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    border-radius: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 1px var(--orange-glow), inset 0 0 12px rgba(255,106,0,0.04);
  }

  select option { background: #111; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 32px;
    border: 1px solid var(--orange);
    color: var(--orange);
    background: transparent;
    cursor: pointer;
    border-radius: 1px;
    transition: background 0.2s, box-shadow 0.2s, color 0.2s;
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover:not(:disabled) {
    background: var(--orange-dim);
    box-shadow: 0 0 20px var(--orange-glow), inset 0 0 20px rgba(255,106,0,0.06);
    color: #fff;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    overflow: hidden;
  }

  .btn:disabled::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,106,0,0.15), transparent);
    animation: sweep 1.8s linear infinite;
  }

  @keyframes sweep {
    0% { left: -60%; }
    100% { left: 120%; }
  }

  .btn-full { width: 100%; justify-content: center; }

  .btn-secondary {
    border-color: rgba(255,106,0,0.4);
    color: var(--text-dim);
    font-size: 10px;
    padding: 10px 20px;
  }

  .btn-secondary:hover:not(:disabled) { color: var(--orange); }

  /* ── PROGRESS ── */
  .progress-wrap { margin: 24px 0; }

  .progress-steps {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 6px;
  }

  .step {
    flex: 1;
    font-size: 9px;
    letter-spacing: 1px;
    text-align: center;
    color: var(--text-dim);
    opacity: 0.4;
    transition: opacity 0.4s, color 0.4s;
    text-transform: uppercase;
    padding: 4px 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .step.active { opacity: 1; color: var(--orange); }
  .step.done   { opacity: 0.7; color: var(--green); }

  .progress-bar-outer {
    width: 100%;
    height: 4px;
    background: rgba(255,106,0,0.1);
    border-radius: 0;
    overflow: hidden;
    border: 1px solid rgba(255,106,0,0.15);
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), #ffaa44);
    width: 0%;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 10px var(--orange-glow);
  }

  .progress-msg {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 1px;
    min-height: 16px;
  }

  /* ── RESULT ── */
  .result-content {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }

  .result-content h1, .result-content h2, .result-content h3 {
    font-family: 'Orbitron', sans-serif;
    color: var(--orange);
    margin: 20px 0 10px;
    letter-spacing: 2px;
  }

  .result-content h1 { font-size: 16px; }
  .result-content h2 { font-size: 14px; }
  .result-content h3 { font-size: 12px; }

  .result-content p { margin-bottom: 12px; }

  .result-content strong { color: var(--orange); }

  .result-content em { color: #c0b5a8; font-style: italic; }

  .result-content ul, .result-content ol {
    padding-left: 20px;
    margin-bottom: 14px;
  }

  .result-content li { margin-bottom: 6px; }

  .result-content code {
    background: rgba(255,106,0,0.08);
    border: 1px solid rgba(255,106,0,0.2);
    padding: 2px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--orange);
  }

  .result-content blockquote {
    border-left: 3px solid var(--orange);
    padding-left: 14px;
    color: var(--text-dim);
    margin: 14px 0;
  }

  .result-content hr {
    border: none;
    border-top: 1px solid rgba(255,106,0,0.2);
    margin: 20px 0;
  }

  /* traffic light keywords */
  .kw-verde  { color: var(--green);  font-weight: bold; }
  .kw-amarillo { color: var(--yellow); font-weight: bold; }
  .kw-rojo   { color: var(--red);    font-weight: bold; }

  /* ── JSON TOGGLE ── */
  .json-panel {
    display: none;
    margin-top: 16px;
    background: var(--bg);
    border: 1px solid rgba(255,106,0,0.15);
    padding: 16px;
    font-size: 11px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.6;
  }

  .json-panel.open { display: block; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,106,0,0.3); }

  /* ── RESULT TOOLBAR ── */
  .result-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,106,0,0.15);
    flex-wrap: wrap;
  }

  /* ── STATUS DOT ── */
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    display: inline-block;
    margin-right: 6px;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .status-dot.idle { animation: none; opacity: 0.3; }
  .status-dot.ok   { background: var(--green); animation: none; }

  /* ── HIDDEN UTIL ── */
  .hidden { display: none !important; }

  /* ── ERROR ── */
  .error-msg {
    color: var(--red);
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 8px;
    min-height: 16px;
  }

  /* ── WEBHOOK HINT ── */
  .hint {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: -14px;
    margin-bottom: 20px;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  /* ── ANIMATIONS on mount ── */
  .card { animation: fadeUp 0.4s ease both; }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.16s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">DOLAR<span>.AR</span></div>
    <div class="clock">
      <div id="clock-time">00:00:00</div>
      <div class="date" id="clock-date"></div>
    </div>
  </header>

  <!-- ===== SCREEN: LOGIN ===== -->
  <div id="screen-login">
    <div class="card">
      <div class="card-title">// Autenticación requerida</div>
      <label for="pwd">Contraseña de acceso</label>
      <input type="password" id="pwd" autocomplete="current-password" placeholder="········">
      <div class="error-msg" id="login-error"></div>
      <button class="btn btn-full" id="btn-login" onclick="doLogin()">
        <span class="status-dot"></span>INGRESAR AL SISTEMA
      </button>
    </div>
  </div>

  <!-- ===== SCREEN: MAIN ===== -->
  <div id="screen-main" class="hidden">

    <!-- Webhook config -->
    <div class="card">
      <div class="card-title">// Configuración de endpoint</div>
      <label for="webhook-url">URL del webhook Make.com</label>
      <input type="url" id="webhook-url" placeholder="https://hook.eu1.make.com/...">
      <div class="hint">↳ Se guarda automáticamente en tu navegador</div>
    </div>

    <!-- Query form -->
    <div class="card">
      <div class="card-title">// Parámetros de consulta</div>
      <div class="form-row">
        <div>
          <label for="tipo-dolar">Tipo de dólar</label>
          <select id="tipo-dolar">
            <option value="blue">Blue</option>
            <option value="oficial">Oficial</option>
            <option value="mep">MEP</option>
            <option value="ccl">CCL</option>
            <option value="mayorista">Mayorista</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="cripto">Cripto</option>
          </select>
        </div>
        <div>
          <label for="tipo-analisis">Tipo de análisis</label>
          <select id="tipo-analisis">
            <option value="completo">Completo</option>
            <option value="brechas">Foco en brechas</option>
            <option value="tendencia">Foco en tendencia</option>
          </select>
        </div>
      </div>
      <button class="btn btn-full" id="btn-analizar" onclick="doAnalizar()">
        <span class="status-dot" id="btn-dot"></span>ANALIZAR MERCADO CAMBIARIO
      </button>
    </div>

    <!-- Progress (hidden until analyzing) -->
    <div class="card hidden" id="card-progress">
      <div class="card-title">// Procesando solicitud</div>
      <div class="progress-wrap">
        <div class="progress-steps" id="progress-steps">
          <div class="step" data-i="0">CONEXIÓN</div>
          <div class="step" data-i="1">DATOS</div>
          <div class="step" data-i="2">ANÁLISIS</div>
          <div class="step" data-i="3">SÍNTESIS</div>
          <div class="step" data-i="4">LISTO</div>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="progress-bar"></div>
        </div>
        <div class="progress-msg" id="progress-msg">Iniciando conexión segura...</div>
      </div>
    </div>

    <!-- Result (hidden until done) -->
    <div class="card hidden" id="card-result">
      <div class="card-title">// Resultado del análisis <span id="result-meta" style="color:var(--text-dim);font-size:9px;letter-spacing:1px;"></span></div>
      <div class="result-content" id="result-md"></div>
      <div class="result-toolbar">
        <button class="btn btn-secondary" onclick="toggleJson()">{ } VER JSON CRUDO</button>
        <button class="btn btn-secondary" onclick="nuevaConsulta()">↩ NUEVA CONSULTA</button>
      </div>
      <div class="json-panel" id="json-panel"></div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────
//  CLOCK
// ─────────────────────────────────────────
function tickClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('es-AR', {hour12:false});
  const d = now.toLocaleDateString('es-AR', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('clock-time').textContent = t;
  document.getElementById('clock-date').textContent = d.toUpperCase();
}
tickClock();
setInterval(tickClock, 1000);

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
const $ = id => document.getElementById(id);

function show(id)   { $(id).classList.remove('hidden'); }
function hide(id)   { $(id).classList.add('hidden'); }

function isVercel() {
  return location.hostname.endsWith('.vercel.app') || location.hostname.endsWith('.vercel.com');
}

// ─────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────
$('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const pwd = $('pwd').value.trim();
  if (!pwd) { $('login-error').textContent = '// ERROR: campo vacío'; return; }

  const btn = $('btn-login');
  btn.disabled = true;
  $('login-error').textContent = '';

  try {
    if (isVercel()) {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      if (!res.ok) throw new Error('ACCESO DENEGADO');
    } else {
      if (pwd !== 'fceuba2026') throw new Error('CONTRASEÑA INCORRECTA');
    }
    // success
    loadWebhookFromStorage();
    hide('screen-login');
    show('screen-main');
  } catch (err) {
    $('login-error').textContent = '// ERROR: ' + err.message;
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────
//  WEBHOOK STORAGE
// ─────────────────────────────────────────
const WH_KEY = 'dolar_ar_webhook';

function loadWebhookFromStorage() {
  const saved = localStorage.getItem(WH_KEY);
  if (saved) $('webhook-url').value = saved;
}

$('webhook-url') && document.addEventListener('DOMContentLoaded', () => {
  $('webhook-url').addEventListener('input', () => {
    localStorage.setItem(WH_KEY, $('webhook-url').value.trim());
  });
});

// persist on blur too
document.addEventListener('DOMContentLoaded', () => {
  $('webhook-url').addEventListener('blur', () => {
    localStorage.setItem(WH_KEY, $('webhook-url').value.trim());
  });
});

// ─────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────
const STEPS_LABELS = [
  'Iniciando conexión segura...',
  'Obteniendo datos de mercado...',
  'Ejecutando modelo de análisis...',
  'Sintetizando resultados...',
  'Finalizando respuesta...'
];

let progressInterval = null;
let currentStep = 0;

function startProgress() {
  currentStep = 0;
  updateProgress(0);
  show('card-progress');

  progressInterval = setInterval(() => {
    if (currentStep < 4) {
      currentStep++;
      updateProgress(currentStep);
    }
  }, 1800);
}

function updateProgress(step) {
  const pct = Math.round((step / 5) * 100);
  $('progress-bar').style.width = pct + '%';
  $('progress-msg').textContent = STEPS_LABELS[step] || '';

  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.remove('active','done');
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  });
}

function finishProgress() {
  clearInterval(progressInterval);
  progressInterval = null;
  updateProgress(4);
  $('progress-bar').style.width = '100%';
  $('progress-msg').textContent = 'Análisis completado.';
}

function stopProgress() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = null;
}

// ─────────────────────────────────────────
//  TRAFFIC LIGHT COLORIZER
// ─────────────────────────────────────────
function colorizeKeywords(html) {
  return html
    .replace(/\bVERDE\b/g, '🟢 <span class="kw-verde">VERDE</span>')
    .replace(/\bAMARILLO\b/g, '🟡 <span class="kw-amarillo">AMARILLO</span>')
    .replace(/\bROJO\b/g, '🔴 <span class="kw-rojo">ROJO</span>');
}

// ─────────────────────────────────────────
//  MAIN ANALYSIS
// ─────────────────────────────────────────
let lastRawResponse = null;

async function doAnalizar() {
  const webhookUrl = $('webhook-url').value.trim();
  if (!webhookUrl) {
    alert('// Por favor ingresá la URL del webhook antes de continuar.');
    return;
  }

  const casa         = $('tipo-dolar').value;
  const tipo_analisis = $('tipo-analisis').value;
  const timestamp    = new Date().toISOString();

  // Save webhook
  localStorage.setItem(WH_KEY, webhookUrl);

  // UI reset
  $('btn-analizar').disabled = true;
  $('btn-dot').classList.remove('ok','idle');
  hide('card-result');
  hide('card-progress');
  lastRawResponse = null;

  startProgress();

  try {
    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo_analisis, casa, timestamp })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

    const data = await res.json();
    lastRawResponse = data;

    finishProgress();

    // Brief pause so user sees 100%
    await new Promise(r => setTimeout(r, 600));

    renderResult(data, casa, tipo_analisis);

  } catch (err) {
    stopProgress();
    hide('card-progress');
    alert('// ERROR al consultar el webhook:\n' + err.message);
  } finally {
    $('btn-analizar').disabled = false;
    $('btn-dot').classList.add('ok');
  }
}

// ─────────────────────────────────────────
//  RENDER RESULT
// ─────────────────────────────────────────
function renderResult(data, casa, tipo_analisis) {
  hide('card-progress');

  // Extract markdown text
  let mdText = '';
  if (typeof data === 'string') {
    mdText = data;
  } else if (data.resultado) {
    mdText = data.resultado;
  } else if (data.text) {
    mdText = data.text;
  } else if (data.message) {
    mdText = data.message;
  } else if (data.response) {
    mdText = data.response;
  } else {
    // Fallback: stringify
    mdText = '```json\n' + JSON.stringify(data, null, 2) + '\n```';
  }

  // Render markdown
  let html = marked.parse(mdText);
  html = colorizeKeywords(html);
  $('result-md').innerHTML = html;

  // Meta
  const now = new Date().toLocaleTimeString('es-AR', {hour12:false});
  $('result-meta').textContent =
    `| ${casa.toUpperCase()} · ${tipo_analisis.toUpperCase()} · ${now}`;

  // JSON panel
  $('json-panel').textContent = JSON.stringify(data, null, 2);
  $('json-panel').classList.remove('open');

  show('card-result');
  $('card-result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─────────────────────────────────────────
//  JSON TOGGLE
// ─────────────────────────────────────────
function toggleJson() {
  const p = $('json-panel');
  p.classList.toggle('open');
}

// ─────────────────────────────────────────
//  NUEVA CONSULTA
// ─────────────────────────────────────────
function nuevaConsulta() {
  hide('card-result');
  hide('card-progress');
  $('btn-analizar').disabled = false;
  $('btn-dot').classList.remove('ok','idle');
